<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Sci-Fi HUD background">
  <defs>
    <radialGradient id="bg" cx="50%" cy="85%" r="90%">
      <stop offset="0%" stop-color="#0a1a36"/>
      <stop offset="55%" stop-color="#04091a"/>
      <stop offset="100%" stop-color="#01030a"/>
    </radialGradient>
    <radialGradient id="nebCyan" cx="18%" cy="22%" r="38%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#00f5ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebViolet" cx="83%" cy="18%" r="34%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#a855f7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebMagenta" cx="50%" cy="100%" r="65%">
      <stop offset="0%" stop-color="#ff3dac" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#ff3dac" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ff3dac" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e6faff" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#e6faff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#e6faff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="gridMinor" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f5ff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <pattern id="gridMajor" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M 200 0 L 0 0 0 200" fill="none" stroke="#00f5ff" stroke-opacity="0.13" stroke-width="1"/>
    </pattern>
    <filter id="softBlur"><feGaussianBlur stdDeviation="1.4"/></filter>
  </defs>

  <!-- Base + nebula layers -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
